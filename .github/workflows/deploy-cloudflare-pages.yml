name: Deploy To Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          set -euo pipefail

          project_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PAGES_PROJECT_NAME}"
          auth_header="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"

          status_code="$(curl -sS -o project-check.json -w "%{http_code}" \
            -H "${auth_header}" \
            -H "Content-Type: application/json" \
            "${project_url}")"

          if [ "${status_code}" = "200" ]; then
            echo "Pages project '${CLOUDFLARE_PAGES_PROJECT_NAME}' already exists."
            rm -f project-check.json
            exit 0
          fi

          if [ "${status_code}" != "404" ]; then
            echo "Unexpected response while checking Pages project:"
            cat project-check.json
            exit 1
          fi

          echo "Pages project '${CLOUDFLARE_PAGES_PROJECT_NAME}' not found. Creating it now."

          create_status="$(curl -sS -o project-create.json -w "%{http_code}" \
            -X POST \
            -H "${auth_header}" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"${CLOUDFLARE_PAGES_PROJECT_NAME}\",\"production_branch\":\"main\"}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects")"

          if [ "${create_status}" != "200" ]; then
            echo "Failed to create Pages project:"
            cat project-create.json
            exit 1
          fi

          echo "Pages project created successfully."
          rm -f project-check.json project-create.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=main
